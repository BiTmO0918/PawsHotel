<section class="vh-100">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col col-xl-10" id="card">
        <div class="card" style="border-radius: 1rem">
          <div class="row g-0">
            <div class="col-md-6 col-lg-5 d-none d-md-block">
              <img
                src="assets/login-image.jpg"
                alt="login form"
                class="img-fluid h-100 w-100"
                style="object-fit: cover; border-radius: 1rem 0 0 1rem"
              />
            </div>
            <div class="col-md-6 col-lg-7 d-flex align-items-center">
              <div class="card-body p-4 p-lg-5 text-black">
                <form (ngSubmit)="login()" #loginForm="ngForm">
                  <div class="d-flex align-items-center mb-3 pb-1">
                    <img id="logo" src="assets/Designer.png" alt="Logo" />
                    <span class="h1 fw-bold mb-0">{{hotelName}}</span>
                  </div>

                  <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px">
                    Sign into your account
                  </h5>

                  <div data-mdb-input-init class="form-outline mb-4">
                    <input 
                    class="form-control form-control-lg"
                    id="email"
                    name="email"
                    [(ngModel)]="email"                
                    required
                    />
                    <label class="form-label" for="email"
                      >Email address</label
                    >
                  </div>

                  <div data-mdb-input-init class="form-outline mb-4">
                    <input
                      class="form-control form-control-lg"
                      id="firstName"
                      name="firstName"
                      type="password"
                      [(ngModel)]="password"   
                      required
                    />
                    <label class="form-label" for="password"
                      >Password</label
                    >
                  </div>

                  <div class="pt-1 mb-4">
                    <button
                      data-mdb-button-init
                      data-mdb-ripple-init
                      class="btn btn-dark btn-lg btn-block"
                      (click)="login()"
                    >
                      Login
                    </button>
                  </div>

                  <p class=" pb-lg-2">
                    Don't have an account?
                    <a href="/register" style="color: #ffc107">Register here</a>
                  </p>
                  <a href="/terms-of-service" class="small text-muted"
                    >Terms of use & Privacy Policy.</a
                  >
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
