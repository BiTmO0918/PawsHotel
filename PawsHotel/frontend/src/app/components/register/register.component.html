<section class="vh-200">
  <div class="container py-5 h-100">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col col-xl-10" id="card">
        <div class="card" style="border-radius: 1rem">
          <div class="row g-0">
            <div class="col-md-12 align-items-center"> <!-- Alterado para col-md-12 -->
              <div class="card-body p-4 p-lg-5 text-black">
                <form (ngSubmit)="register()" #registerForm="ngForm">
                  <div class="d-flex align-items-center mb-3 pb-1">
                    <img id="logo" src="assets/Designer.png" alt="Logo" />
                    <span class="h1 fw-bold mb-0">{{ hotelName }}</span>
                  </div>
                  <h5 class="fw-normal mb-3 pb-3" style="letter-spacing: 1px">
                    Create your account
                  </h5>
                  <div class="form-outline mb-4">
                    <input
                      placeholder="John"
                      class="form-control form-control-lg w-100"
                      id="firstName"
                      name="firstName"
                      [(ngModel)]="firstName"
                      required
                    />
                    <label class="form-label" for="firstName">First Name</label>
                  </div>
                  <div class="form-outline mb-4">
                    <input
                      placeholder="Doe"
                      class="form-control form-control-lg w-100"
                      id="lastName"
                      name="lastName"
                      [(ngModel)]="lastName"
                      required
                    />
                    <label class="form-label" for="lastName">Last Name</label>
                  </div>
                  <div class="form-outline mb-4">
                    <input
                      placeholder="johndoe@email.com"
                      class="form-control form-control-lg w-100"
                      id="email"
                      name="email"
                      [(ngModel)]="email"
                      required
                    />
                    <label class="form-label" for="email">Email</label>
                  </div>
                  <div class="form-outline mb-4">
                    <input
                      placeholder="999 999 999"
                      class="form-control form-control-lg w-100"
                      id="phone"
                      name="phone"
                      [(ngModel)]="phone"
                    />
                    <label class="form-label" for="phone">Phone Number</label>
                  </div>
                  <div class="form-outline mb-4">
                    <input
                      placeholder="123 Main St, Springfield, USA"
                      class="form-control form-control-lg w-100"
                      id="address"
                      name="address"
                      [(ngModel)]="address"
                    />
                    <label class="form-label" for="address">Address</label>
                  </div>
                  <div class="form-outline mb-4">
                    <input
                      placeholder="Choose a strong password!"
                      class="form-control form-control-lg w-100"
                      id="password"
                      name="password"
                      type="password"
                      [(ngModel)]="password"
                      required
                    />
                    <label class="form-label" for="password">Password</label>
                  </div>
                  <div class="pt-1 mb-4">
                    <button
                      type="submit"
                      class="btn btn-dark btn-lg btn-block w-100"
                      [disabled]="!registerForm.form.valid"
                    >
                      Register
                    </button>
                  </div>
                  <a href="/terms-of-service" class="small text-muted"
                    >Terms of use & Privacy Policy.</a
                  >
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
